{% extends "base.html" %}
{% block content %}

<div class="card shadow-sm" style="max-width: 820px; border-radius: 16px;">
  <div class="card-body p-4">
    <h4 class="mb-3">{{ modo }} tarefa</h4>

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.GET.next|default:request.META.HTTP_REFERER|default:'' }}">

      <div class="mb-3">
        <label class="form-label">Título</label>
        {{ form.titulo }}
      </div>

      <div class="mb-3">
        <label class="form-label">Descrição</label>
        {{ form.descricao }}
      </div>

      <div class="row g-2">
        <div class="col-md-6 mb-3">
          <label class="form-label">Prazo</label>
          {{ form.prazo }}
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Atribuída para</label>
          {{ form.atribuida_para }}
        </div>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary">Salvar</button>
        <a class="btn btn-outline-secondary" href="{{ request.GET.next|default:'/' }}">Voltar</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
