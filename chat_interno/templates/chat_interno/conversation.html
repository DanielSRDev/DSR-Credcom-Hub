{% for m in mensagens %}
<div class="msg {% if m.sender == request.user %}mine{% endif %}">
    <div class="msg-user">{{ m.sender.username }}</div>

    {% if m.text %}
        <div class="msg-text">{{ m.text }}</div>
    {% endif %}

    {% if m.image %}
        <img src="{{ m.image.url }}" class="msg-img">
    {% endif %}

    <div class="msg-time">{{ m.created_at|date:"H:i" }}</div>
</div>
{% endfor %}
