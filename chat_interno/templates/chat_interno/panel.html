<div class="d-flex flex-column gap-2">
  <div class="d-flex gap-2">
    <input id="chatSearchUsers" class="form-control form-control-sm" placeholder="Pesquisar contato...">
  </div>

  <div id="chatUserList" class="list-group" style="max-height: 60vh; overflow:auto;">
    {% for u in contatos %}
      <button type="button"
              class="list-group-item list-group-item-action"
              onclick="ChatUI.open({{ u.id }})">
        <div class="fw-semibold">{{ u.username }}</div>
        <div class="small text-secondary">Clique para abrir</div>
      </button>
    {% empty %}
      <div class="text-secondary small">Nenhum contato disponível para você.</div>
    {% endfor %}
  </div>
</div>

<script>
  (function(){
    const input = document.getElementById("chatSearchUsers");
    const list = document.getElementById("chatUserList");
    if(!input || !list) return;

    input.addEventListener("input", () => {
      const q = input.value.toLowerCase().trim();
      [...list.querySelectorAll(".list-group-item")].forEach(item => {
        const txt = item.innerText.toLowerCase();
        item.style.display = txt.includes(q) ? "" : "none";
      });
    });
  })();
</script>
