{% load static %}

<div class="chat-left-col">
  <div class="d-flex flex-column gap-2 h-100">
    <div class="d-flex gap-2">
      <input id="chatSearchUsers" class="form-control form-control-sm" placeholder="Pesquisar contato...">
    </div>

    <div id="chatUserList" class="list-group flex-grow-1" style="max-height: 60vh; overflow:auto;">
      {% for u in chat_contacts %}
        <button type="button"
                class="list-group-item list-group-item-action"
                onclick="ChatUI.open({{ u.id }})">
          <div class="fw-semibold">{{ u.name|default:u.username }}</div>
          <div class="small text-secondary">
            {% if u.online %}🟢 Online{% else %}⚪ Offline{% endif %}
            {% if u.unread %} • <b>{{ u.unread }}</b> nova(s){% endif %}
          </div>
        </button>
      {% empty %}
        <div class="text-secondary small">Nenhum contato disponível para você.</div>
      {% endfor %}
    </div>

    <div class="chat-status-box">
      <button data-status="online" onclick="ChatUI.setStatus('online')" class="status online">
        🟢 Online
      </button>

      <button data-status="ausente" onclick="ChatUI.setStatus('ausente')" class="status away">
        🟡 Ausente
      </button>

      <button data-status="offline" onclick="ChatUI.setStatus('offline')" class="status offline">
        ⚫ Offline
      </button>
    </div>

    <div id="chatMonitorBox" class="chat-monitor-box" style="display:none;">
      <select id="chatMonitorSelect" class="form-select form-select-sm">
        <option value="">Minha visão</option>
      </select>
    </div>
  </div>
</div>

<script src="{% static 'chat_interno/chat.js' %}"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("chatSearchUsers");
    const list = document.getElementById("chatUserList");
    if (!input || !list) return;

    input.addEventListener("input", () => {
      const q = input.value.toLowerCase().trim();
      [...list.querySelectorAll(".list-group-item")].forEach(item => {
        const txt = item.innerText.toLowerCase();
        item.style.display = txt.includes(q) ? "" : "none";
      });
    });
  });
</script>
